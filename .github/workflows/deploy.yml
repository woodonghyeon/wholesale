name: Deploy to GCP

on:
  workflow_dispatch:  # 수동 배포만 허용

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            cd ~/wholesale
            git pull origin main
            npm install
            npm run build
            pm2 restart wholesale
